name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  web-lint:
    name: Web — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm --filter web lint

      - name: Type check
        run: pnpm --filter web type-check

      - name: Type check shared types
        run: pnpm --filter types type-check

  # ─── Backend ────────────────────────────────────────────────────────────────
  api-lint:
    name: API — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --group dev

      - name: Ruff lint
        working-directory: apps/api
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: apps/api
        run: uv run ruff format --check .

      - name: Mypy type check
        working-directory: apps/api
        run: uv run mypy app/

  api-test:
    name: API — Tests
    runs-on: ubuntu-latest
    needs: api-lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lawlens_test
          POSTGRES_USER: lawlens
          POSTGRES_PASSWORD: lawlens
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lawlens"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --group dev

      - name: Run tests
        working-directory: apps/api
        run: uv run pytest tests/ -v --cov=app --cov-report=xml
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://lawlens:lawlens@localhost:5432/lawlens_test
          DATABASE_URL_SYNC: postgresql://lawlens:lawlens@localhost:5432/lawlens_test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          SECRET_KEY: test-secret-key
